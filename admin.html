<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Droplee — Order dashboard</title>
<meta name="robots" content="noindex, nofollow"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #22C55E;
    --forest: #0D1F0D;
    --sage: #F0F7F1;
    --white: #ffffff;
    --mist: #6B7A6B;
    --slate: #3F4A3F;
  }
  body { font-family: 'Poppins', sans-serif; background: var(--sage); color: var(--forest); min-height: 100vh; }
  header { background: var(--forest); color: var(--white); padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 1.2rem; }
  header a { color: var(--green); text-decoration: none; font-size: 0.85rem; font-weight: 600; }
  .wrap { max-width: 900px; margin: 0 auto; padding: 24px 16px 60px; }
  #loginGate { max-width: 380px; margin: 60px auto; background: var(--white); padding: 28px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
  #loginGate input { width: 100%; padding: 12px 14px; margin-bottom: 10px; border: 1.5px solid #E2E8E2; border-radius: 10px; font-family: inherit; font-size: 0.95rem; }
  #loginGate button { width: 100%; padding: 13px; background: var(--green); border: none; border-radius: 10px; color: var(--white); font-weight: 700; cursor: pointer; }
  #loginError { color: #dc2626; font-size: 0.85rem; margin-top: 8px; display: none; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab-btn { padding: 8px 16px; border-radius: 100px; border: 1.5px solid #d3ddd3; background: var(--white); font-family: inherit; font-weight: 600; font-size: 0.85rem; cursor: pointer; color: var(--slate); }
  .tab-btn.active { background: var(--forest); color: var(--white); border-color: var(--forest); }
  .order-card { background: var(--white); border-radius: 14px; padding: 18px 20px; margin-bottom: 14px; box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
  .order-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .order-status { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 4px 10px; border-radius: 100px; }
  .status-placed { background: #fef3c7; color: #92400e; }
  .status-store_accepted { background: #dbeafe; color: #1e40af; }
  .status-preparing { background: #ede9fe; color: #5b21b6; }
  .status-ready_for_pickup { background: #d1fae5; color: #065f46; }
  .status-delivered { background: #e5e7eb; color: #374151; }
  .status-rejected { background: #fee2e2; color: #991b1b; }
  .item-line { font-size: 0.85rem; color: var(--slate); margin-bottom: 2px; }
  .actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .actions button { padding: 9px 16px; border-radius: 8px; border: none; font-family: inherit; font-weight: 600; font-size: 0.82rem; cursor: pointer; }
  .btn-accept { background: var(--green); color: var(--white); }
  .btn-reject { background: #fee2e2; color: #991b1b; }
  .btn-next { background: var(--forest); color: var(--white); }
  #emptyMsg { color: var(--mist); text-align: center; padding: 40px 0; }
</style>
</head>
<body>

<header>
  <h1>📦 Droplee — Order dashboard</h1>
  <a href="index.html">← Back to site</a>
</header>

<div class="wrap">
  <div id="loginGate">
    <h2 style="margin-bottom:16px;">Store login</h2>
    <input type="email" id="adminEmail" placeholder="Email"/>
    <input type="password" id="adminPassword" placeholder="Password"/>
    <button id="adminLoginBtn">Log in</button>
    <p id="loginError"></p>
  </div>

  <div id="dashboard" style="display:none;">
    <div class="tabs">
      <button class="tab-btn section-btn active" data-section="orders">Orders</button>
      <button class="tab-btn section-btn" data-section="menu">Manage menu</button>
    </div>

    <div id="ordersSection">
      <div class="tabs">
        <button class="tab-btn filter-btn active" data-filter="active">Active orders</button>
        <button class="tab-btn filter-btn" data-filter="all">All orders</button>
      </div>
      <div id="ordersList"></div>
      <p id="emptyMsg" style="display:none;">No orders yet.</p>
    </div>

    <div id="menuSection" style="display:none;">
      <label style="font-weight:600;font-size:0.85rem;display:block;margin-bottom:6px;">Store</label>
      <select id="menuStoreSelect" style="width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid #d3ddd3;font-family:inherit;margin-bottom:20px;"></select>

      <div class="order-card">
        <div style="font-weight:700;margin-bottom:12px;">Add a menu item</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <input id="newItemName" placeholder="Item name" style="flex:2;min-width:160px;padding:10px 12px;border-radius:8px;border:1.5px solid #d3ddd3;font-family:inherit;"/>
          <input id="newItemPrice" type="number" placeholder="Price (R)" style="flex:1;min-width:100px;padding:10px 12px;border-radius:8px;border:1.5px solid #d3ddd3;font-family:inherit;"/>
          <button id="addItemBtn" class="btn-accept" style="padding:10px 18px;">Add item</button>
        </div>
        <p id="menuError" style="color:#dc2626;font-size:0.85rem;margin-top:8px;display:none;"></p>
      </div>

      <div id="menuItemsList" style="margin-top:20px;"></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCyMzg1D27qODVImEtAR5YhKV5_kWTskas",
    authDomain: "droplee.firebaseapp.com",
    projectId: "droplee",
    storageBucket: "droplee.firebasestorage.app",
    messagingSenderId: "240182730322",
    appId: "1:240182730322:web:de6cdd6decf071e88e898b",
    measurementId: "G-JSES0DWZN4"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  const statusFlow = ['placed', 'store_accepted', 'preparing', 'ready_for_pickup', 'delivered'];
  const statusLabels = {
    placed: 'New order', store_accepted: 'Accepted', preparing: 'Preparing',
    ready_for_pickup: 'Ready for pickup', delivered: 'Delivered', rejected: 'Rejected'
  };
  let currentFilter = 'active';
  let unsubscribe = null;

  function fmtR(n) { return 'R' + n.toFixed(2).replace(/\.00$/, ''); }

  auth.onAuthStateChanged(function(user) {
    if (user) {
      document.getElementById('loginGate').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      listenForOrders();
    } else {
      document.getElementById('loginGate').style.display = 'block';
      document.getElementById('dashboard').style.display = 'none';
      if (unsubscribe) unsubscribe();
    }
  });

  document.getElementById('adminLoginBtn').addEventListener('click', function() {
    const email = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value;
    const errorEl = document.getElementById('loginError');
    errorEl.style.display = 'none';
    auth.signInWithEmailAndPassword(email, password).catch(function(err) {
      errorEl.textContent = err.message;
      errorEl.style.display = 'block';
    });
  });

  document.querySelectorAll('.section-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.section-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      const section = btn.getAttribute('data-section');
      document.getElementById('ordersSection').style.display = section === 'orders' ? 'block' : 'none';
      document.getElementById('menuSection').style.display = section === 'menu' ? 'block' : 'none';
      if (section === 'menu') loadStoresIntoSelect();
    });
  });

  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentFilter = btn.getAttribute('data-filter');
      listenForOrders();
    });
  });

  // ── MENU MANAGEMENT ──
  function loadStoresIntoSelect() {
    const select = document.getElementById('menuStoreSelect');
    db.collection('stores').get().then(function(snap) {
      select.innerHTML = '';
      snap.forEach(function(doc) {
        const opt = document.createElement('option');
        opt.value = doc.id;
        opt.textContent = doc.data().name;
        select.appendChild(opt);
      });
      if (select.value) loadMenuItems(select.value);
    });
  }

  document.getElementById('menuStoreSelect').addEventListener('change', function() {
    loadMenuItems(this.value);
  });

  function loadMenuItems(storeId) {
    const list = document.getElementById('menuItemsList');
    list.innerHTML = '<p style="color:var(--mist);">Loading…</p>';
    db.collection('menuitems').where('storeId', '==', storeId).get().then(function(snap) {
      if (snap.empty) { list.innerHTML = '<p style="color:var(--mist);">No items yet — add one above.</p>'; return; }
      list.innerHTML = '';
      snap.forEach(function(doc) {
        const item = doc.data();
        const row = document.createElement('div');
        row.className = 'order-card';
        row.style.cssText += 'display:flex;justify-content:space-between;align-items:center;';
        row.innerHTML =
          '<div><div style="font-weight:600;">' + item.name + '</div>' +
          '<div style="font-size:0.85rem;color:var(--mist);">' + fmtR(item.price) + '</div></div>';
        const delBtn = document.createElement('button');
        delBtn.className = 'btn-reject';
        delBtn.textContent = 'Delete';
        delBtn.addEventListener('click', function() {
          if (confirm('Delete "' + item.name + '"?')) {
            db.collection('menuitems').doc(doc.id).delete().then(function() { loadMenuItems(storeId); });
          }
        });
        row.appendChild(delBtn);
        list.appendChild(row);
      });
    });
  }

  document.getElementById('addItemBtn').addEventListener('click', function() {
    const storeId = document.getElementById('menuStoreSelect').value;
    const name = document.getElementById('newItemName').value.trim();
    const price = parseFloat(document.getElementById('newItemPrice').value);
    const errorEl = document.getElementById('menuError');
    errorEl.style.display = 'none';

    if (!storeId) { errorEl.textContent = 'No store selected.'; errorEl.style.display = 'block'; return; }
    if (!name) { errorEl.textContent = 'Please enter an item name.'; errorEl.style.display = 'block'; return; }
    if (isNaN(price) || price <= 0) { errorEl.textContent = 'Please enter a valid price.'; errorEl.style.display = 'block'; return; }

    db.collection('menuitems').add({ storeId: storeId, name: name, price: price }).then(function() {
      document.getElementById('newItemName').value = '';
      document.getElementById('newItemPrice').value = '';
      loadMenuItems(storeId);
    }).catch(function(err) {
      errorEl.textContent = err.message;
      errorEl.style.display = 'block';
    });
  });

  let isFirstOrderLoad = true;

  function playNewOrderSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [0, 0.18].forEach(function(delay) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.15, ctx.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.15);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + 0.16);
      });
    } catch (e) { /* audio not available, ignore */ }
  }

  function listenForOrders() {
    if (unsubscribe) unsubscribe();
    let query = db.collection('orders').orderBy('createdAt', 'desc');
    unsubscribe = query.onSnapshot(function(snap) {
      if (!isFirstOrderLoad) {
        snap.docChanges().forEach(function(change) {
          if (change.type === 'added' && change.doc.data().status === 'placed') {
            playNewOrderSound();
          }
        });
      }
      isFirstOrderLoad = false;

      const orders = [];
      snap.forEach(function(doc) { orders.push(Object.assign({ id: doc.id }, doc.data())); });
      const filtered = currentFilter === 'active'
        ? orders.filter(function(o) { return o.status !== 'delivered' && o.status !== 'rejected'; })
        : orders;
      renderOrders(filtered);
    }, function(err) {
      document.getElementById('ordersList').innerHTML = '<p style="color:#dc2626;">' + err.message + '</p>';
    });
  }

  function renderOrders(orders) {
    const list = document.getElementById('ordersList');
    const emptyMsg = document.getElementById('emptyMsg');
    if (orders.length === 0) {
      list.innerHTML = '';
      emptyMsg.style.display = 'block';
      return;
    }
    emptyMsg.style.display = 'none';
    list.innerHTML = '';
    orders.forEach(function(order) {
      const card = document.createElement('div');
      card.className = 'order-card';
      const itemsHtml = (order.items || []).map(function(it) {
        return '<div class="item-line">' + it.qty + '× ' + it.name + ' — ' + fmtR(it.price * it.qty) + '</div>';
      }).join('');
      const when = order.createdAt && order.createdAt.toDate ? order.createdAt.toDate().toLocaleString() : '';

      card.innerHTML =
        '<div class="order-top">' +
          '<div>' +
            '<div style="font-weight:700;">' + (order.storeName || 'Store') + ' · ' + fmtR(order.total || 0) + '</div>' +
            '<div style="font-size:0.8rem;color:var(--mist);">' + (order.customerName || order.customerEmail || 'Customer') + ' · ' + when + '</div>' +
          '</div>' +
          '<span class="order-status status-' + order.status + '">' + (statusLabels[order.status] || order.status) + '</span>' +
        '</div>' +
        itemsHtml +
        '<div class="actions" data-order-id="' + order.id + '"></div>';

      const actions = card.querySelector('.actions');
      const currentIndex = statusFlow.indexOf(order.status);

      if (order.status === 'placed') {
        const acceptBtn = document.createElement('button');
        acceptBtn.className = 'btn-accept'; acceptBtn.textContent = 'Accept order';
        acceptBtn.addEventListener('click', function() { updateStatus(order.id, 'store_accepted'); });
        const rejectBtn = document.createElement('button');
        rejectBtn.className = 'btn-reject'; rejectBtn.textContent = 'Reject';
        rejectBtn.addEventListener('click', function() { updateStatus(order.id, 'rejected'); });
        actions.appendChild(acceptBtn); actions.appendChild(rejectBtn);
      } else if (currentIndex > -1 && currentIndex < statusFlow.length - 1) {
        const nextStatus = statusFlow[currentIndex + 1];
        const nextBtn = document.createElement('button');
        nextBtn.className = 'btn-next'; nextBtn.textContent = 'Mark as ' + statusLabels[nextStatus];
        nextBtn.addEventListener('click', function() { updateStatus(order.id, nextStatus); });
        actions.appendChild(nextBtn);
      }
      list.appendChild(card);
    });
  }

  function updateStatus(orderId, status) {
    db.collection('orders').doc(orderId).update({ status: status });
  }
</script>
</body>
</html>
