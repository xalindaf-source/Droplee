<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Droplee — Product</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #22C55E; --green-dark: #16a34a;
    --forest: #0D1F0D; --sage: #F0F7F1; --slate: #4A5E4A; --mist: #8aab8a;
    --white: #FFFFFF; --border: #ddeedd; --radius: 14px;
    --shadow: 0 4px 24px rgba(13,31,13,0.08);
  }
  body { font-family: 'Poppins', sans-serif; background: var(--sage); color: var(--forest); min-height: 100vh; }
  nav { position: sticky; top: 0; z-index: 200; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 68px; background: rgba(255,255,255,0.95); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 1.4rem; color: var(--green); text-decoration: none; }
  .btn-nav-primary { padding: 9px 20px; border-radius: 8px; font-size: 0.875rem; font-weight: 600; color: var(--forest); background: var(--green); border: none; cursor: pointer; text-decoration: none; }
  a.back-link { color: var(--green); text-decoration: none; font-size: 0.85rem; font-weight: 600; display: inline-block; margin: 20px 0 0 24px; }
  .wrap { max-width: 900px; margin: 0 auto; padding: 16px 24px 80px; }
  .product-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 20px; }
  .product-photo { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: var(--radius); background: var(--white); box-shadow: var(--shadow); }
  .product-photo-placeholder { width: 100%; aspect-ratio: 1; border-radius: var(--radius); background: var(--white); box-shadow: var(--shadow); display: flex; align-items: center; justify-content: center; font-size: 4rem; }
  .product-store-link { color: var(--green); text-decoration: none; font-size: 0.85rem; font-weight: 600; }
  .product-name { font-family: 'Poppins', sans-serif; font-size: 1.8rem; font-weight: 700; margin: 8px 0 12px; }
  .product-price { font-size: 1.4rem; font-weight: 700; color: var(--forest); margin-bottom: 20px; }
  .product-description { color: var(--slate); line-height: 1.7; margin-bottom: 28px; white-space: pre-line; }
  .add-to-cart-big { background: var(--green); color: var(--white); border: none; border-radius: 10px; padding: 14px 28px; font-family: inherit; font-weight: 700; font-size: 1rem; cursor: pointer; }
  .add-to-cart-big:hover { background: var(--green-dark); }
  @media (max-width: 700px) { .product-layout { grid-template-columns: 1fr; gap: 20px; } }

  #cartFab { display: none; position: fixed; bottom: 24px; right: 24px; background: var(--green); color: var(--white); border: none; border-radius: 100px; padding: 14px 22px; font-family: 'Poppins',sans-serif; font-weight: 700; font-size: 0.95rem; box-shadow: 0 12px 30px rgba(34,197,94,0.4); cursor: pointer; z-index: 900; align-items: center; gap: 8px; }
  #cartModalOverlay { display: none; position: fixed; inset: 0; background: rgba(13,31,13,0.6); z-index: 999; align-items: center; justify-content: center; padding: 20px; }
  #cartModalOverlay .modal-inner { background: var(--white); border-radius: 20px; max-width: 460px; width: 100%; max-height: 85vh; overflow-y: auto; padding: 28px; position: relative; box-shadow: 0 30px 80px rgba(0,0,0,0.3); }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">droplee</a>
  <div style="display:flex;align-items:center;gap:14px;">
    <a href="orders.html" id="navCartIcon" style="position:relative;text-decoration:none;color:var(--forest);font-size:1.3rem;line-height:1;">
      🛒
      <span id="navCartBadge" style="display:none;position:absolute;top:-8px;right:-10px;background:var(--green);color:var(--white);font-size:0.65rem;font-weight:700;border-radius:100px;padding:2px 6px;min-width:16px;text-align:center;"></span>
    </a>
    <div id="navAuthArea"></div>
  </div>
</nav>

<a href="#" id="backToStoreLink" class="back-link">← Back to store</a>

<div class="wrap">
  <div id="productLayout" class="product-layout">
    <p style="color:var(--mist);">Loading product…</p>
  </div>
</div>

<button id="cartFab">🛒 <span id="cartFabCount">0</span> · <span id="cartFabTotal">R0</span></button>

<div id="cartModalOverlay">
  <div class="modal-inner">
    <button id="cartModalClose" style="position:absolute;top:16px;right:16px;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--slate);">✕</button>
    <h2 style="font-family:'Poppins',sans-serif;font-size:1.3rem;color:var(--forest);margin-bottom:20px;">Your cart</h2>
    <div id="cartModalItems"></div>
    <div style="border-top:1.5px solid #E2E8E2;margin-top:16px;padding-top:16px;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-family:'Poppins',sans-serif;font-weight:700;color:var(--forest);">Total</span>
      <span id="cartModalTotal" style="font-family:'Poppins',sans-serif;font-weight:700;color:var(--forest);font-size:1.15rem;">R0</span>
    </div>
    <button id="checkoutBtn" style="width:100%;padding:14px;margin-top:18px;background:var(--green);border:none;border-radius:10px;color:var(--white);font-family:'Poppins',sans-serif;font-weight:700;font-size:0.95rem;cursor:pointer;">Place order</button>
    <p id="checkoutError" style="color:#dc2626;font-size:0.85rem;margin-top:10px;display:none;"></p>
    <p id="checkoutSuccess" style="color:var(--green);font-size:0.9rem;margin-top:10px;display:none;font-weight:600;"></p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCyMzg1D27qODVImEtAR5YhKV5_kWTskas",
    authDomain: "droplee.firebaseapp.com",
    projectId: "droplee",
    storageBucket: "droplee.firebasestorage.app",
    messagingSenderId: "240182730322",
    appId: "1:240182730322:web:de6cdd6decf071e88e898b",
    measurementId: "G-JSES0DWZN4"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  function fmtR(n) { return 'R' + n.toFixed(2).replace(/\.00$/, ''); }

  const params = new URLSearchParams(window.location.search);
  const itemId = params.get('id');
  const storeIdParam = params.get('store');

  document.getElementById('backToStoreLink').href = storeIdParam ? 'store.html?id=' + encodeURIComponent(storeIdParam) : 'index.html';

  // ── NAV AUTH STATE ──
  const navAuthArea = document.getElementById('navAuthArea');
  auth.onAuthStateChanged(function(user) {
    if (user) {
      const name = user.displayName || user.email.split('@')[0];
      navAuthArea.innerHTML = '<span style="font-weight:600;margin-right:14px;">Welcome, ' + name + '</span><a href="#" id="logoutBtn" class="btn-nav-primary">Log out</a>';
      document.getElementById('logoutBtn').addEventListener('click', function(e) { e.preventDefault(); auth.signOut(); });
    } else {
      navAuthArea.innerHTML = '<a href="index.html" class="btn-nav-primary">Log in</a>';
    }
  });

  // ── LOAD PRODUCT ──
  if (!itemId) {
    document.getElementById('productLayout').innerHTML = '<p style="color:#dc2626;">No product specified.</p>';
  } else {
    let itemData = null;
    let storeData = null;

    db.collection('menuitems').doc(itemId).get().then(function(doc) {
      if (!doc.exists) {
        document.getElementById('productLayout').innerHTML = '<p style="color:#dc2626;">This product could not be found.</p>';
        return;
      }
      itemData = Object.assign({ id: doc.id }, doc.data());
      document.title = itemData.name + ' — Droplee';
      return db.collection('stores').doc(itemData.storeId).get();
    }).then(function(storeDoc) {
      if (!itemData) return;
      storeData = storeDoc && storeDoc.exists ? Object.assign({ id: storeDoc.id }, storeDoc.data()) : null;
      document.getElementById('backToStoreLink').href = 'store.html?id=' + encodeURIComponent(itemData.storeId);

      const photoHtml = itemData.photo
        ? '<img class="product-photo" src="' + itemData.photo + '" alt="' + itemData.name + '"/>'
        : '<div class="product-photo-placeholder">📦</div>';

      document.getElementById('productLayout').innerHTML =
        photoHtml +
        '<div>' +
          (storeData ? '<a class="product-store-link" href="store.html?id=' + storeData.id + '">' + storeData.name + '</a>' : '') +
          '<h1 class="product-name">' + itemData.name + '</h1>' +
          '<div class="product-price">' + fmtR(itemData.price) + '</div>' +
          '<p class="product-description">' + (itemData.description || 'No description available for this product yet.') + '</p>' +
          '<button class="add-to-cart-big" id="addToCartBtn">Add to cart</button>' +
        '</div>';

      document.getElementById('addToCartBtn').addEventListener('click', function() {
        addToCart(itemData.storeId, storeData ? storeData.name : '', storeData ? storeData.ownerEmail : null, itemData.id, itemData.name, itemData.price);
        const btn = document.getElementById('addToCartBtn');
        btn.textContent = 'Added ✓';
        setTimeout(function() { btn.textContent = 'Add to cart'; }, 1000);
      });
    }).catch(function(err) {
      document.getElementById('productLayout').innerHTML = '<p style="color:#dc2626;">' + err.message + '</p>';
    });
  }

  // ── CART (shared via localStorage) ──
  let cart = JSON.parse(localStorage.getItem('droplee_cart') || '[]');
  function saveCart() { localStorage.setItem('droplee_cart', JSON.stringify(cart)); }

  function addToCart(storeId, storeName, ownerEmail, itemId, name, price) {
    const existing = cart.find(function(c) { return c.itemId === itemId; });
    if (existing) { existing.qty += 1; }
    else { cart.push({ storeId: storeId, storeName: storeName, ownerEmail: ownerEmail, itemId: itemId, name: name, price: price, qty: 1 }); }
    saveCart();
    updateCartUI();
  }

  function cartTotal() { return cart.reduce(function(sum, c) { return sum + c.price * c.qty; }, 0); }
  function cartCount() { return cart.reduce(function(sum, c) { return sum + c.qty; }, 0); }

  function updateCartUI() {
    const fab = document.getElementById('cartFab');
    const badge = document.getElementById('navCartBadge');
    if (cart.length === 0) {
      fab.style.display = 'none';
      if (badge) badge.style.display = 'none';
      return;
    }
    fab.style.display = 'inline-flex';
    document.getElementById('cartFabCount').textContent = cartCount();
    document.getElementById('cartFabTotal').textContent = fmtR(cartTotal());
    if (badge) { badge.style.display = 'inline-block'; badge.textContent = cartCount(); }
  }
  updateCartUI();

  function renderCartModal() {
    const itemsEl = document.getElementById('cartModalItems');
    if (cart.length === 0) {
      itemsEl.innerHTML = '<p style="color:var(--mist);">Your cart is empty.</p>';
    } else {
      itemsEl.innerHTML = cart.map(function(c, i) {
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #E2E8E2;">' +
          '<div><div style="font-weight:600;color:var(--forest);">' + c.name + ' × ' + c.qty + '</div>' +
          '<div style="font-size:0.8rem;color:var(--mist);">' + c.storeName + '</div></div>' +
          '<div style="display:flex;align-items:center;gap:8px;">' +
          '<span style="font-weight:600;color:var(--forest);">' + fmtR(c.price * c.qty) + '</span>' +
          '<button data-i="' + i + '" class="cartRemoveBtn" style="background:none;border:none;color:#dc2626;cursor:pointer;font-size:1.1rem;">✕</button>' +
          '</div></div>';
      }).join('');
      document.querySelectorAll('.cartRemoveBtn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          cart.splice(parseInt(btn.getAttribute('data-i')), 1);
          saveCart();
          renderCartModal(); updateCartUI();
        });
      });
    }
    document.getElementById('cartModalTotal').textContent = fmtR(cartTotal());
  }

  const cartModalOverlay = document.getElementById('cartModalOverlay');
  document.getElementById('cartFab').addEventListener('click', function() { renderCartModal(); cartModalOverlay.style.display = 'flex'; });
  document.getElementById('cartModalClose').addEventListener('click', function() { cartModalOverlay.style.display = 'none'; });
  cartModalOverlay.addEventListener('click', function(e) { if (e.target === cartModalOverlay) cartModalOverlay.style.display = 'none'; });

  document.getElementById('checkoutBtn').addEventListener('click', function() {
    const errorEl = document.getElementById('checkoutError');
    const successEl = document.getElementById('checkoutSuccess');
    errorEl.style.display = 'none'; successEl.style.display = 'none';

    if (cart.length === 0) { errorEl.textContent = 'Your cart is empty.'; errorEl.style.display = 'block'; return; }

    const user = auth.currentUser;
    if (!user) {
      errorEl.textContent = 'Please log in first — your cart is saved, head to the homepage to log in.';
      errorEl.style.display = 'block';
      return;
    }

    const storeIds = Array.from(new Set(cart.map(function(c) { return c.storeId; })));
    const batchPromises = storeIds.map(function(sid) {
      const itemsForStore = cart.filter(function(c) { return c.storeId === sid; });
      const total = itemsForStore.reduce(function(sum, c) { return sum + c.price * c.qty; }, 0);
      const sName = itemsForStore[0].storeName;
      const ownerEmail = itemsForStore[0].ownerEmail;
      const itemLines = itemsForStore.map(function(c) { return c.qty + '× ' + c.name; }).join(', ');

      return db.collection('orders').add({
        customerUid: user.uid,
        customerName: user.displayName || '',
        customerEmail: user.email || '',
        storeId: sid,
        storeName: sName,
        items: itemsForStore.map(function(c) { return { itemId: c.itemId, name: c.name, price: c.price, qty: c.qty }; }),
        total: total,
        status: 'placed',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      }).then(function() {
        if (ownerEmail) {
          return db.collection('mail').add({
            to: [ownerEmail],
            message: {
              subject: 'New Droplee order — ' + sName,
              text: 'New order from ' + (user.displayName || user.email) + '\n\nItems: ' + itemLines + '\nTotal: R' + total.toFixed(2) + '\n\nOpen your dashboard to accept it: https://droplee.co.za/admin.html'
            }
          });
        }
      });
    });

    Promise.all(batchPromises).then(function() {
      cart = [];
      saveCart();
      updateCartUI();
      renderCartModal();
      successEl.textContent = 'Order placed! The store will confirm shortly.';
      successEl.style.display = 'block';
      setTimeout(function() { cartModalOverlay.style.display = 'none'; successEl.style.display = 'none'; }, 2000);
    }).catch(function(err) {
      errorEl.textContent = err.message;
      errorEl.style.display = 'block';
    });
  });
</script>
</body>
</html>
