<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Droplee — Your orders</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #22C55E; --green-dark: #16a34a;
    --forest: #0D1F0D; --sage: #F0F7F1; --slate: #4A5E4A; --mist: #8aab8a;
    --white: #FFFFFF; --border: #ddeedd; --radius: 14px;
    --shadow: 0 4px 24px rgba(13,31,13,0.08);
  }
  body { font-family: 'Poppins', sans-serif; background: var(--sage); color: var(--forest); min-height: 100vh; }
  nav { position: sticky; top: 0; z-index: 200; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 68px; background: rgba(255,255,255,0.95); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 1.4rem; color: var(--green); text-decoration: none; }
  .btn-nav-primary { padding: 9px 20px; border-radius: 8px; font-size: 0.875rem; font-weight: 600; color: var(--forest); background: var(--green); border: none; cursor: pointer; text-decoration: none; }
  .wrap { max-width: 700px; margin: 0 auto; padding: 32px 20px 80px; }
  h1 { font-family: 'Poppins', sans-serif; font-size: 1.5rem; margin-bottom: 20px; }
  h2 { font-family: 'Poppins', sans-serif; font-size: 1.1rem; margin: 28px 0 14px; }
  .card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px 20px; margin-bottom: 14px; }
  .cart-line { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #E2E8E2; }
  .cart-line:last-child { border-bottom: none; }
  .remove-btn { background: none; border: none; color: #dc2626; cursor: pointer; font-size: 1.1rem; }
  .checkout-btn { width: 100%; padding: 14px; margin-top: 14px; background: var(--green); border: none; border-radius: 10px; color: var(--white); font-family: inherit; font-weight: 700; font-size: 0.95rem; cursor: pointer; }
  .order-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .order-status { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 4px 10px; border-radius: 100px; }
  .status-placed { background: #fef3c7; color: #92400e; }
  .status-store_accepted { background: #dbeafe; color: #1e40af; }
  .status-preparing { background: #ede9fe; color: #5b21b6; }
  .status-ready_for_pickup { background: #d1fae5; color: #065f46; }
  .status-delivered { background: #e5e7eb; color: #374151; }
  .status-rejected { background: #fee2e2; color: #991b1b; }
  .item-line { font-size: 0.85rem; color: var(--slate); margin-bottom: 2px; }
  #emptyMsg, #loginPrompt { color: var(--mist); text-align: center; padding: 40px 0; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">droplee</a>
  <div id="navAuthArea"></div>
</nav>

<div class="wrap">
  <h1>Your cart & orders</h1>

  <div id="loginPrompt" style="display:none;">
    Please <a href="index.html" style="color:var(--green);font-weight:600;">log in on the homepage</a> to see your orders. Your cart is saved.
  </div>

  <div id="cartSection" style="display:none;">
    <h2>Your cart</h2>
    <div class="card">
      <div id="cartItems"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1.5px solid #E2E8E2;">
        <span style="font-weight:700;">Total</span>
        <span id="cartTotalDisplay" style="font-weight:700;font-size:1.1rem;">R0</span>
      </div>
      <button class="checkout-btn" id="checkoutBtn">Place order</button>
      <p id="checkoutError" style="color:#dc2626;font-size:0.85rem;margin-top:10px;display:none;"></p>
      <p id="checkoutSuccess" style="color:var(--green);font-size:0.9rem;margin-top:10px;display:none;font-weight:600;"></p>
    </div>
  </div>

  <div id="ordersSection" style="display:none;">
    <h2>Your orders</h2>
    <div id="ordersList"></div>
    <p id="emptyMsg" style="display:none;">No orders yet — go browse some stores!</p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCyMzg1D27qODVImEtAR5YhKV5_kWTskas",
    authDomain: "droplee.firebaseapp.com",
    projectId: "droplee",
    storageBucket: "droplee.firebasestorage.app",
    messagingSenderId: "240182730322",
    appId: "1:240182730322:web:de6cdd6decf071e88e898b",
    measurementId: "G-JSES0DWZN4"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  const statusLabels = {
    placed: 'New order', store_accepted: 'Accepted', preparing: 'Preparing',
    ready_for_pickup: 'Ready for pickup', delivered: 'Delivered', rejected: 'Rejected'
  };

  function fmtR(n) { return 'R' + n.toFixed(2).replace(/\.00$/, ''); }

  // ── CART (shared via localStorage) ──
  let cart = JSON.parse(localStorage.getItem('droplee_cart') || '[]');
  function saveCart() { localStorage.setItem('droplee_cart', JSON.stringify(cart)); }
  function cartTotal() { return cart.reduce(function(sum, c) { return sum + c.price * c.qty; }, 0); }

  function renderCart() {
    const cartSection = document.getElementById('cartSection');
    if (cart.length === 0) { cartSection.style.display = 'none'; return; }
    cartSection.style.display = 'block';
    const itemsEl = document.getElementById('cartItems');
    itemsEl.innerHTML = cart.map(function(c, i) {
      return '<div class="cart-line">' +
        '<div><div style="font-weight:600;">' + c.name + ' × ' + c.qty + '</div>' +
        '<div style="font-size:0.8rem;color:var(--mist);">' + c.storeName + '</div></div>' +
        '<div style="display:flex;align-items:center;gap:8px;">' +
        '<span style="font-weight:600;">' + fmtR(c.price * c.qty) + '</span>' +
        '<button data-i="' + i + '" class="removeBtn remove-btn">✕</button>' +
        '</div></div>';
    }).join('');
    document.querySelectorAll('.removeBtn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        cart.splice(parseInt(btn.getAttribute('data-i')), 1);
        saveCart();
        renderCart();
      });
    });
    document.getElementById('cartTotalDisplay').textContent = fmtR(cartTotal());
  }
  renderCart();

  document.getElementById('checkoutBtn').addEventListener('click', function() {
    const errorEl = document.getElementById('checkoutError');
    const successEl = document.getElementById('checkoutSuccess');
    errorEl.style.display = 'none'; successEl.style.display = 'none';
    if (cart.length === 0) { errorEl.textContent = 'Your cart is empty.'; errorEl.style.display = 'block'; return; }

    const user = auth.currentUser;
    if (!user) { errorEl.textContent = 'Please log in on the homepage first.'; errorEl.style.display = 'block'; return; }

    const storeIds = Array.from(new Set(cart.map(function(c) { return c.storeId; })));
    const batchPromises = storeIds.map(function(sid) {
      const itemsForStore = cart.filter(function(c) { return c.storeId === sid; });
      const total = itemsForStore.reduce(function(sum, c) { return sum + c.price * c.qty; }, 0);
      const sName = itemsForStore[0].storeName;
      const ownerEmail = itemsForStore[0].ownerEmail;
      const itemLines = itemsForStore.map(function(c) { return c.qty + '× ' + c.name; }).join(', ');

      return db.collection('orders').add({
        customerUid: user.uid,
        customerName: user.displayName || '',
        customerEmail: user.email || '',
        storeId: sid,
        storeName: sName,
        items: itemsForStore.map(function(c) { return { itemId: c.itemId, name: c.name, price: c.price, qty: c.qty }; }),
        total: total,
        status: 'placed',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      }).then(function() {
        if (ownerEmail) {
          return db.collection('mail').add({
            to: [ownerEmail],
            message: {
              subject: 'New Droplee order — ' + sName,
              text: 'New order from ' + (user.displayName || user.email) + '\n\nItems: ' + itemLines + '\nTotal: R' + total.toFixed(2) + '\n\nOpen your dashboard to accept it: https://droplee.co.za/admin.html'
            }
          });
        }
      });
    });

    Promise.all(batchPromises).then(function() {
      cart = [];
      saveCart();
      renderCart();
      successEl.textContent = 'Order placed! Scroll down to track it.';
      successEl.style.display = 'block';
      setTimeout(function() { successEl.style.display = 'none'; }, 3000);
    }).catch(function(err) {
      errorEl.textContent = err.message;
      errorEl.style.display = 'block';
    });
  });

  // ── MY ORDERS (live) ──
  let unsubscribeOrders = null;
  function listenForMyOrders(uid) {
    if (unsubscribeOrders) unsubscribeOrders();
    unsubscribeOrders = db.collection('orders').where('customerUid', '==', uid).orderBy('createdAt', 'desc')
      .onSnapshot(function(snap) {
        const list = document.getElementById('ordersList');
        const emptyMsg = document.getElementById('emptyMsg');
        if (snap.empty) {
          list.innerHTML = '';
          emptyMsg.style.display = 'block';
          return;
        }
        emptyMsg.style.display = 'none';
        list.innerHTML = '';
        snap.forEach(function(doc) {
          const order = doc.data();
          const when = order.createdAt && order.createdAt.toDate ? order.createdAt.toDate().toLocaleString() : '';
          const itemsHtml = (order.items || []).map(function(it) {
            return '<div class="item-line">' + it.qty + '× ' + it.name + ' — ' + fmtR(it.price * it.qty) + '</div>';
          }).join('');
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML =
            '<div class="order-top">' +
              '<div><div style="font-weight:700;">' + (order.storeName || 'Store') + ' · ' + fmtR(order.total || 0) + '</div>' +
              '<div style="font-size:0.8rem;color:var(--mist);">' + when + '</div></div>' +
              '<span class="order-status status-' + order.status + '">' + (statusLabels[order.status] || order.status) + '</span>' +
            '</div>' + itemsHtml;
          list.appendChild(card);
        });
      }, function(err) {
        document.getElementById('ordersList').innerHTML = '<p style="color:#dc2626;">' + err.message + '</p>';
      });
  }

  // ── AUTH STATE ──
  auth.onAuthStateChanged(function(user) {
    const navAuthArea = document.getElementById('navAuthArea');
    if (user) {
      const name = user.displayName || user.email.split('@')[0];
      navAuthArea.innerHTML = '<span style="font-weight:600;margin-right:14px;">Welcome, ' + name + '</span><a href="#" id="logoutBtn" class="btn-nav-primary">Log out</a>';
      document.getElementById('logoutBtn').addEventListener('click', function(e) { e.preventDefault(); auth.signOut(); });

      document.getElementById('loginPrompt').style.display = 'none';
      document.getElementById('ordersSection').style.display = 'block';
      listenForMyOrders(user.uid);
    } else {
      navAuthArea.innerHTML = '<a href="index.html" class="btn-nav-primary">Log in</a>';
      document.getElementById('ordersSection').style.display = 'none';
      if (cart.length === 0) document.getElementById('loginPrompt').style.display = 'block';
      if (unsubscribeOrders) unsubscribeOrders();
    }
  });
</script>
</body>
</html>
